<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>My Bio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#0f0f0f,#1a1a1a,#000);
color:white;
overflow:hidden;
}

.card{
text-align:center;
background:rgba(20,20,20,0.8);
padding:40px;
border-radius:20px;
width:320px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,255,255,0.1);
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.avatar{
width:120px;
border-radius:50%;
margin-bottom:15px;
border:3px solid white;
}

h1{
font-size:28px;
margin-bottom:5px;
}

.bio{
color:#aaa;
margin-bottom:20px;
min-height:20px;
}

.links a{
display:block;
margin:10px 0;
padding:10px;
border-radius:10px;
text-decoration:none;
color:white;
background:#111;
transition:0.3s;
box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.links a:hover{
background:#222;
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.footer{
margin-top:20px;
font-size:12px;
color:#555;
}

</style>
</head>

<body>

<div class="card">

<img class="avatar" src="avatar.png">

<h1>YOUR NAME</h1>

<p class="bio" id="typing"></p>

<div class="links">

<a href="#">GitHub</a>
<a href="#">Discord</a>
<a href="#">Telegram</a>
<a href="#">TikTok</a>

</div>

<div class="footer">
made with github pages
</div>

</div>

<script>

const text = "developer • gamer • designer";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

</script>

</body>
</html>
